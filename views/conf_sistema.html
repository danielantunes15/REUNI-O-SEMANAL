<script>
    // Agora usando window. para ser global e evitar erro de 'Already declared'
    window.chavesGlobais = ['resp_geral', 'resp_rh', 'resp_operacional', 'resp_manutencao', 'resp_ssma'];
    
    // Aproveita a conexão central do config_db.js
    window._supabase = window.supabaseClientGlobal; 
    
    window.membrosKanbanList = [];
    
    window.buscarConfiguracoesDoBanco = async function() {
        if (window._supabase) {
            try {
                const { data, error } = await window._supabase.from('configuracoes').select('chave, valor');
                if (error) throw error;
                
                if (data && data.length > 0) {
                    data.forEach(item => {
                        if (item.chave === 'membros_kanban') {
                            window.membrosKanbanList = JSON.parse(item.valor);
                            window.carregarTabelaMembros();
                        } else {
                            const input = document.getElementById(item.chave);
                            if (input) {
                                input.value = item.valor;
                            }
                        }
                    });
                }
            } catch (err) {
                console.warn('Erro ao buscar configurações no banco:', err);
            }
        }
    };

    window.salvarConfiguracoesNoBanco = async function() {
        const btn = document.getElementById('btn-salvar-config');
        const status = document.getElementById('msg-status');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
        status.innerText = '';
        
        const dadosParaSalvar = window.chavesGlobais.map(chave => {
            const input = document.getElementById(chave);
            return {
                chave: chave,
                valor: input ? input.value.trim() : ''
            };
        });

        try {
            if (window._supabase) {
                const { error } = await window._supabase.from('configuracoes').upsert(dadosParaSalvar, { onConflict: 'chave' });
                if (error) throw error;
                
                status.style.color = 'var(--verde)';
                status.innerText = 'Salvo no banco de dados!';
            } else {
                throw new Error("Supabase não carregado.");
            }
        } catch (err) {
            console.error('Erro no Supabase:', err);
            status.style.color = 'var(--vermelho)';
            status.innerText = 'Erro ao salvar!';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
            
            setTimeout(() => {
                if (status.innerText.includes('Salvo')) {
                    status.innerText = '';
                }
            }, 4000);
        }
    };

    window.sincronizarMembrosNoBanco = async function() {
        if (!window._supabase) return;
        try {
            const { error } = await window._supabase.from('configuracoes').upsert([
                { chave: 'membros_kanban', valor: JSON.stringify(window.membrosKanbanList) }
            ], { onConflict: 'chave' });
            
            if (error) throw error;
        } catch (err) {
            console.error('Erro ao sincronizar membros do Kanban no banco:', err);
        }
    };

    window.carregarTabelaMembros = function() {
        const tbody = document.getElementById('tabela-membros-kb');
        
        if (window.membrosKanbanList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--text-dim);">Nenhum membro cadastrado.</td></tr>';
            return;
        }
        
        tbody.innerHTML = window.membrosKanbanList.map((m, index) => `
            <tr>
                <td style="color: white; font-weight: bold;">${m.nome}</td>
                <td style="color: var(--primary);">${m.setor}</td>
                <td style="text-align: right;">
                    <button class="btn-kanban" style="background: var(--vermelho);" onclick="window.removerMembroKanban(${index})">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    };

    window.adicionarMembroKanban = async function() {
        const nome = document.getElementById('novo_nome_kb').value.trim();
        const setor = document.getElementById('novo_setor_kb').value.trim();
        const msg = document.getElementById('msg-kb-status');
        
        if (!nome || !setor) {
            msg.style.color = 'var(--vermelho)'; 
            msg.innerText = 'Preencha nome e setor!';
            return;
        }
        
        window.membrosKanbanList.push({ nome, setor });
        await window.sincronizarMembrosNoBanco();
        
        document.getElementById('novo_nome_kb').value = '';
        document.getElementById('novo_setor_kb').value = '';
        
        msg.style.color = 'var(--verde)'; 
        msg.innerText = 'Membro Adicionado!';
        setTimeout(() => msg.innerText = '', 3000);
        
        window.carregarTabelaMembros();
    };

    window.removerMembroKanban = async function(index) {
        if (!confirm("Remover este membro?")) return;
        window.membrosKanbanList.splice(index, 1);
        await window.sincronizarMembrosNoBanco();
        window.carregarTabelaMembros();
    };

    // Inicializa carregamento
    window.buscarConfiguracoesDoBanco();
</script>
